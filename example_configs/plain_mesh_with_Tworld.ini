# ===========================================================================
# Author: Lucas Berg
# Description: Simple simulation to test the Tworld model with a 2D slab.
# ============================================================================
[main]
num_threads=6
dt_pde=0.005
simulation_time=500.0
abort_on_no_activity=false
use_adaptivity=false

[update_monodomain]
main_function=update_monodomain_default

[save_result]
print_rate=200
output_dir=./outputs/plain_mesh_Tworld_gpu_en
add_timestamp=false
binary=true
save_ode_state_variables=false
main_function=save_as_ensight
remove_older_simulation=true

[assembly_matrix]
init_function=set_initial_conditions_fvm
sigma_x=0.000176
sigma_y=0.000176
sigma_z=0.000176
library_file=shared_libs/libdefault_matrix_assembly.so
main_function=homogeneous_sigma_assembly_matrix

[linear_system_solver]
tolerance=1e-16
use_preconditioner=no
max_iterations=500
library_file=shared_libs/libdefault_linear_system_solver.so
use_gpu=yes
main_function=conjugate_gradient
init_function=init_conjugate_gradient
end_function=end_conjugate_gradient

[domain]
name=Plain Mesh
num_layers=1
start_dx=100.0
start_dy=100.0
start_dz=100.0
side_length=20000
main_function=initialize_grid_with_square_mesh

; Rush-Larsen
[ode_solver]
adaptive=false
dt=0.005
use_gpu=yes
gpu_id=0
library_file= shared_libs/libTworld.so

[stim_corner]
start = 0.0
duration = 1.0
current = -53.0
min_x = 0.0
max_x = 1000.0
min_y = 0.0
max_y = 1000.0
main_function=stim_x_y_limits
